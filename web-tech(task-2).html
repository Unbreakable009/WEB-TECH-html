<!DOCTYPE html>
<html>
<body>

    <h1><b>Registration</b></h1>

    <table cellpadding="6" cellspacing="3">
        <tr>
            <td valign="top">

                <b>General Information:</b><br><br>

                <table cellpadding="4" cellspacing="2">
                    <tr>
                        <td><b>First <br>Name :</b></td>
                        <td><input type="text" id="firstName"></td>
                    </tr>
                    <tr>
                        <td><b>Last <br>Name :</b></td>
                        <td><input type="text" id="lastName"></td>
                    </tr>
                    <tr>
                        <td><b>Gender :</b></td>
                        <td>
                            <input type="radio" name="gender" value="male"> Male
                            <input type="radio" name="gender" value="female"> Female
                        </td>
                    </tr>
                    <tr>
                        <td><b>Father's <br>Name :</b></td>
                        <td>
                            <input type="text" id="fatherName">
                            <input type="file" name="file">
                        </td>
                    </tr>
                    <tr>
                        <td><b>Mother's <br>Name :</b></td>
                        <td><input type="text" id="motherName"></td>
                    </tr>
                    <tr>
                        <td><b>Blood <br>Group :</b></td>
                        <td>
                            <select id="bloodGroup">
                                <option>A+</option>
                                <option>B+</option>
                                <option>O+</option>
                                <option>AB+</option>
                                <option>A-</option>
                                <option>B-</option>
                                <option>O-</option>
                                <option>AB-</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><b>Religion :</b></td>
                        <td>
                            <select id="religion">
                                <option>Islam</option>
                                <option>Hindu</option>
                                <option>Christian</option>
                                <option>Buddhist</option>
                            </select>
                        </td>
                    </tr>
                </table>

            </td>

            <td valign="top" width="40">&nbsp;</td>

            <td valign="top">

                <b>Contact Information:</b><br><br>

                <table cellpadding="4" cellspacing="2">
                    <tr>
                        <td><b>Email :</b></td>
                        <td><input type="email" id="email"></td>
                    </tr>
                    <tr>
                        <td><b>Phone/Mobile :</b></td>
                        <td><input type="number" id="phone"></td>
                    </tr>
                    <tr>
                        <td><b>Website :</b></td>
                        <td><input type="text" id="website"></td>
                    </tr>
                    <tr>
                        <td valign="top"><b>Present Address</b></td>
                        <td>
                            <select id="country">
                                <option>Bangladesh</option>
                                <option>Japan</option>
                                <option>Morocco</option>
                                <option>Palestine</option>
                                <option>Iran</option>
                            </select>
                            <select id="division">
                                <option>Dhaka</option>
                                <option>Barishal</option>
                                <option>Khulna</option>
                                <option>Rajshahi</option>
                                <option>Jamalpur</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><b>Address :</b></td>
                        <td><textarea id="address" rows="3" cols="20" placeholder="Road/Street/City"></textarea></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="text" id="postCode" placeholder="Post Code"></td>
                    </tr>
                </table>

            </td>

            <td valign="top" width="40">&nbsp;</td>

            <td valign="top">

                <b>Account Information:</b><br><br>

                <table cellpadding="4" cellspacing="2">
                    <tr>
                        <td><b>Username :</b></td>
                        <td><input type="text" id="username"></td>
                    </tr>
                    <tr>
                        <td><b>Password :</b></td>
                        <td><input type="password" id="password"></td>
                    </tr>
                    <tr>
                        <td><b>Confirm <br>Password :</b></td>
                        <td><input type="password" id="confirmPassword"></td>
                    </tr>
                    <tr>
                        <td></td>
                        <td><input type="submit" value="Register"></td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>
</html>
